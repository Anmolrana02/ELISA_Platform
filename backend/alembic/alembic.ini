# Paste contents from the generated alembic/alembic.ini here
# backend/alembic/alembic.ini
# Alembic configuration file.
# DATABASE_URL is overridden programmatically in env.py — do not set it here.

[alembic]
# Path to migration scripts, relative to this file's directory
script_location = alembic

# Template for new migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone used in migration file timestamps
timezone = UTC

# Truncate slug to this length
truncate_slug_length = 40

# Revision directory
version_locations = %(here)s/versions

# prepend_sys_path is used when alembic.ini is in the repo root;
# here it's in backend/ so we add backend/ itself.
prepend_sys_path = .

# ── Logging ───────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S